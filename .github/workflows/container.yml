name: Build container

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Normalize image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: web
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/hilihili-player:web
          cache-from: type=gha,scope=container
      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/hilihili-player:backend
          cache-from: type=gha,scope=container
          cache-to: type=gha,mode=max,scope=container
