name: Build container

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: corepack pnpm install --frozen-lockfile
      # lint 只红叉不阻断：warning 不应挡住新版本体验
      - name: Lint (non-blocking)
        run: corepack pnpm lint
        continue-on-error: true
      # 以下三项失败会阻断镜像推送（真问题）
      - name: Typecheck
        run: corepack pnpm typecheck
      - name: Test
        run: corepack pnpm test
      - name: Build
        run: corepack pnpm build

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Normalize image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: web
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/hilihili-player:web
          cache-from: type=gha,scope=container
      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/hilihili-player:backend
          cache-from: type=gha,scope=container
          cache-to: type=gha,mode=max,scope=container
