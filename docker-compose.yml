services:
  api:
    image: ghcr.io/eray114514/hilihili-player:latest
    command: pnpm --filter @hilihili/api start
    environment:
      HILI_API_HOST: 0.0.0.0
      HILI_API_PORT: 4141
      HILI_DATA_DIR: /data
    ports:
      - "4141:4141"
    volumes:
      - hilihili-data:/data
      - /volume1/@home/Eray:/volume1/Eray
    restart: unless-stopped

  worker:
    image: ghcr.io/eray114514/hilihili-player:latest
    command: pnpm --filter @hilihili/worker start
    environment:
      HILI_DATA_DIR: /data
      HILI_SCAN_INTERVAL_MS: 900000
    volumes:
      - hilihili-data:/data
      - /volume1/@home/Eray:/volume1/Eray
    restart: unless-stopped

  web:
    image: ghcr.io/eray114514/hilihili-player:latest
    command: pnpm --filter @hilihili/web start
    environment:
      API_BASE_URL: http://api:4141
    ports:
      - "3001:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  hilihili-data:
